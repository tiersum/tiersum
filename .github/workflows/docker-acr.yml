# Build and push TierSum Linux images to Alibaba Cloud ACR — one native runner per arch (no QEMU).
#
# Tags pushed (replace <ns> with your ACR_NAMESPACE secret):
#   tag v1.2.3        →  .../tiersum:v1.2.3-amd64  and  .../v1.2.3-arm64 (+ sha-* per arch)
#   workflow_dispatch →  .../tiersum:manual-<12hexsha>-amd64 / ...-arm64 (+ sha-*)
#   (push to main no longer triggers this workflow.)
#
# Required secrets: ACR_USERNAME, ACR_PASSWORD, ACR_NAMESPACE (see deployments/docker/README.md)
#
# Arm job uses GitHub-hosted ubuntu-24.04-arm64. If unavailable on your plan, remove the arm64
# matrix row or switch to a self-hosted arm64 runner.

name: Docker (ACR)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: crpi-gp9w4rgj2tki21xk.cn-hangzhou.personal.cr.aliyuncs.com
  IMAGE_NAME: tiersum

permissions:
  contents: read

jobs:
  build-push:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            tag_suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm64
            tag_suffix: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Image tag (per branch / tag / arch)
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          NS="${{ secrets.ACR_NAMESPACE }}"
          BASE="${{ env.REGISTRY }}/${NS}/${{ env.IMAGE_NAME }}"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "primary=${BASE}:${GITHUB_REF_NAME}-${{ matrix.tag_suffix }}" >> "$GITHUB_OUTPUT"
          else
            echo "primary=${BASE}:manual-${GITHUB_SHA:0:12}-${{ matrix.tag_suffix }}" >> "$GITHUB_OUTPUT"
          fi
          echo "sha=${BASE}:sha-${GITHUB_SHA:0:12}-${{ matrix.tag_suffix }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/docker/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ steps.tag.outputs.primary }}
            ${{ steps.tag.outputs.sha }}
          build-args: |
            VERSION=${{ github.ref_name }}
