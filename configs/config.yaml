# TierSum Configuration
# Structure matches configs/config.example.yaml; adjust values for your environment.

server:
  port: 8080

llm:
  # Moonshot (Kimi) — OpenAI-compatible API
  provider: openai
  # Strip chain-of-thought blocks; for some OpenAI-compatible APIs also disables thinking in the request.
  disable_think: true

  openai:
    api_key: ${MOONSHOT_API_KEY}
    base_url: https://api.moonshot.cn/v1
    model: kimi-k2.5
    max_tokens: 2000
    temperature: 0.3

  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
    base_url: https://api.anthropic.com
    model: claude-3-haiku-20240307
    max_tokens: 2000
    temperature: 0.3

  local:
    base_url: http://localhost:11434
    model: llama3.2
    timeout: 60s

summarization:
  document_summary_max: 500
  chapter_summary_max: 300

storage:
  database:
    driver: sqlite3
    dsn: ./data/tiersum.db
    max_connections: 20
    min_connections: 5

quota:
  per_hour: 100

# OpenTelemetry: HTTP + progressive-query spans export to table otel_spans (run migrations).
# Search UI "Trace sample" uses ?debug_trace=1; requires enabled + persist_to_db for DB export.
telemetry:
  enabled: true
  persist_to_db: true
  sample_ratio: 0.1
  service_name: tiersum
  force_sample_query_param: debug_trace
  force_sample_header: X-TierSum-Debug-Trace

# Progressive query (POST /api/v1/query/progressive): answer LLM + optional detailed trace spans.
query:
  allow_progressive_debug: true
  progressive_answer_max_tokens: 0
  progressive_answer_max_references: 0
  progressive_answer_excerpt_max_bytes: 0

# Same shape as config.example.yaml (cold_index.embedding.* is read by the server).
cold_index:
  markdown:
    chapter_max_tokens: 512
    sliding_stride_tokens: 100
  search:
    branch_recall_multiplier: 2
    branch_recall_floor: 20
    branch_recall_ceiling: 200
  embedding:
    provider: auto
    # Apple Silicon (arm64). Intel Mac: third_party/onnxruntime/darwin_amd64/lib/libonnxruntime.dylib
    onnx_runtime_path: third_party/onnxruntime/darwin_arm64/lib/libonnxruntime.dylib
    minilm_model_path: third_party/minilm/model.onnx
    minilm_tokenizer_path: ""

mcp:
  enabled: true
  base_url: ""

documents:
  tiering:
    hot_content_threshold: 5000
    cold_promotion_threshold: 3

logging:
  level: info
  format: console
  output: stdout
  file_path: ./logs/tiersum.log
  caller: true

security:
  # Non-empty → /api/v1/* requires X-API-Key or Authorization: Bearer <value>. Does not apply to /bff/v1/* (see api.BFFAuth).
  api_key: ""

features:
  web_ui: true
