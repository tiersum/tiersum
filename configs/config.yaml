# TierSum Configuration
# Copy from config.example.yaml and modify as needed

server:
  port: 8080
  host: 0.0.0.0
  timeout: 30s
  max_body_size: 10MB
  web_dir: /Users/luodaijun/GolandProjects/tiersum/web/dist
  cors:
    enabled: true
    allowed_origins:
      - "http://localhost:3000"
      - "http://localhost:8080"

llm:
  # Moonshot (Kimi) — OpenAI-compatible API
  provider: openai

  openai:
    api_key: ${MOONSHOT_API_KEY}
    base_url: https://api.moonshot.cn/v1
    model: kimi-k2.5
    max_tokens: 2000
    temperature: 0.3

  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
    base_url: https://api.anthropic.com
    model: claude-3-haiku-20240307
    max_tokens: 2000
    temperature: 0.3

  local:
    base_url: http://localhost:11434
    model: llama3.2
    timeout: 60s

summarization:
  document_summary_max: 500
  chapter_summary_max: 300
  paragraph_summary_max: 150
  workers: 4
  batch_size: 10

# Storage configuration
storage:
  database:
    # Driver: sqlite3 (default) or postgres
    driver: sqlite3
    # For SQLite: file path
    # For PostgreSQL: connection string
    dsn: ./data/tiersum.db
    # PostgreSQL specific settings (ignored for SQLite)
    max_connections: 20
    min_connections: 5

  # Local cache settings
  cache:
    ttl: 1h
    max_size: 10000

mcp:
  enabled: true
  transport: sse
  path: /mcp/sse
  allowed_tools: []

documents:
  supported_formats:
    - markdown
    - md
  max_size: 50MB
  chunking:
    enabled: true
    max_chunk_size: 10000
    overlap: 200

logging:
  level: info
  format: console
  output: stdout
  file_path: ./logs/tiersum.log
  caller: true

security:
  api_key: ""
  jwt_secret: ${JWT_SECRET}
  token_expiry: 24h

features:
  incremental_updates: true
  auto_convert: false
  web_ui: false
