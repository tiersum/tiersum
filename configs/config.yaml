# TierSum Configuration
# Structure matches configs/config.example.yaml; adjust values for your environment.

server:
  port: 8080
  host: 0.0.0.0
  timeout: 30s
  max_body_size: 10MB
  cors:
    enabled: true
    allowed_origins:
      - "http://localhost:3000"
      - "http://localhost:8080"

llm:
  # Moonshot (Kimi) — OpenAI-compatible API
  provider: openai

  openai:
    api_key: ${MOONSHOT_API_KEY}
    base_url: https://api.moonshot.cn/v1
    model: kimi-k2.5
    max_tokens: 2000
    temperature: 0.3

  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
    base_url: https://api.anthropic.com
    model: claude-3-haiku-20240307
    max_tokens: 2000
    temperature: 0.3

  local:
    base_url: http://localhost:11434
    model: llama3.2
    timeout: 60s

summarization:
  document_summary_max: 500
  chapter_summary_max: 300
  paragraph_summary_max: 150
  workers: 4
  batch_size: 10

storage:
  database:
    driver: sqlite3
    dsn: ./data/tiersum.db
    max_connections: 20
    min_connections: 5

  cache:
    ttl: 1h
    max_size: 10000

quota:
  per_hour: 100

# Same shape as config.example.yaml (cold_index.embedding.* is read by the server).
cold_index:
  markdown:
    chapter_max_tokens: 512
    sliding_stride_tokens: 100
  search:
    branch_recall_multiplier: 2
    branch_recall_floor: 20
    branch_recall_ceiling: 200
  embedding:
    provider: auto
    # Apple Silicon (arm64). Intel Mac: third_party/onnxruntime/darwin_amd64/lib/libonnxruntime.dylib
    onnx_runtime_path: third_party/onnxruntime/darwin_arm64/lib/libonnxruntime.dylib
    minilm_model_path: third_party/minilm/model.onnx
    minilm_tokenizer_path: ""

mcp:
  enabled: true
  transport: sse
  path: /mcp/sse
  base_url: ""
  allowed_tools: []

documents:
  supported_formats:
    - markdown
    - md
  max_size: 50MB
  chunking:
    enabled: true
    max_chunk_size: 10000
    overlap: 200
  tiering:
    hot_content_threshold: 5000
    cold_promotion_threshold: 3

logging:
  level: info
  format: console
  output: stdout
  file_path: ./logs/tiersum.log
  caller: true

security:
  api_key: ""
  jwt_secret: ${JWT_SECRET}
  token_expiry: 24h

features:
  incremental_updates: false
  auto_convert: false
  web_ui: false
  cold_doc_search: true
