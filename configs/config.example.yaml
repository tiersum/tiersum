# TierSum Configuration Example
# Copy this file to config.yaml and modify as needed

# Server configuration
server:
  # HTTP server port
  port: 8080
  # Bind address (0.0.0.0 for all interfaces, 127.0.0.1 for local only)
  host: 0.0.0.0
  # Request timeout
  timeout: 30s
  # Maximum request body size (10MB)
  max_body_size: 10MB
  # Enable CORS (for web UI development)
  cors:
    enabled: true
    allowed_origins:
      - "http://localhost:3000"
      - "http://localhost:8080"

# LLM configuration
llm:
  # Provider: openai, anthropic, local, azure
  provider: openai
  # Strip chain-of-thought / thinking blocks from all provider replies. For OpenAI-compatible
  # DeepSeek, DashScope, and SiliconFlow URLs, also sends chat_template_kwargs.enable_thinking=false.
  disable_think: true

  # OpenAI specific (also works with OpenAI-compatible APIs)
  openai:
    api_key: ${OPENAI_API_KEY}
    base_url: https://api.openai.com/v1
    model: gpt-4o-mini
    # Max tokens for summary generation
    max_tokens: 2000
    temperature: 0.3

  # OpenAI-compatible providers (use 'openai' provider with custom base_url):
  #
  # DeepSeek:
  #   provider: openai
  #   openai:
  #     api_key: ${DEEPSEEK_API_KEY}
  #     base_url: https://api.deepseek.com/v1
  #     model: deepseek-chat
  #
  # Groq:
  #   provider: openai
  #   openai:
  #     api_key: ${GROQ_API_KEY}
  #     base_url: https://api.groq.com/openai/v1
  #     model: llama-3.1-8b-instant
  #
  # Zhipu AI (GLM):
  #   provider: openai
  #   openai:
  #     api_key: ${ZHIPU_API_KEY}
  #     base_url: https://open.bigmodel.cn/api/paas/v4
  #     model: glm-4-flash
  #
  # Moonshot (Kimi):
  #   provider: openai
  #   openai:
  #     api_key: ${MOONSHOT_API_KEY}
  #     base_url: https://api.moonshot.cn/v1
  #     model: moonshot-v1-8k
  #
  # OpenRouter:
  #   provider: openai
  #   openai:
  #     api_key: ${OPENROUTER_API_KEY}
  #     base_url: https://openrouter.ai/api/v1
  #     model: anthropic/claude-3.5-haiku
  #
  # SiliconFlow:
  #   provider: openai
  #   openai:
  #     api_key: ${SILICONFLOW_API_KEY}
  #     base_url: https://api.siliconflow.cn/v1
  #     model: deepseek-ai/DeepSeek-V2.5
  #
  # Azure OpenAI:
  #   provider: openai
  #   openai:
  #     api_key: ${AZURE_OPENAI_API_KEY}
  #     base_url: https://your-resource.openai.azure.com/openai/deployments/your-deployment
  #     model: gpt-4o-mini  # Deployment name

  # Anthropic specific
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
    base_url: https://api.anthropic.com
    model: claude-3-haiku-20240307
    max_tokens: 2000
    temperature: 0.3

  # Local/Ollama specific
  local:
    base_url: http://localhost:11434
    model: llama3.2
    timeout: 60s

# Progressive query (POST /api/v1/query/progressive) — synthesized AI answer only (extra LLM call after retrieval).
# Hot/cold retrieval still uses llm.* above for tag/doc/chapter filters. Smaller values here reduce answer latency.
query:
  # Max completion tokens for the answer (unset: min(llm.*.max_tokens, 900)). Set higher for longer answers.
  progressive_answer_max_tokens: 0
  # How many top references (by relevance) to include in the answer prompt (unset: 12, max 30).
  progressive_answer_max_references: 0
  # Max bytes per reference excerpt in that prompt (unset: 3500, max 6000).
  progressive_answer_excerpt_max_bytes: 0

# Summarization configuration
summarization:
  # Summary length limits (in characters)
  document_summary_max: 500
  chapter_summary_max: 300
  paragraph_summary_max: 150

  # Concurrent processing workers
  workers: 4

  # Batch size for document processing
  batch_size: 10

# Storage configuration
storage:
  database:
    # Database driver: sqlite3 (default) or postgres
    driver: sqlite3
    
    # Database connection string:
    # SQLite: file path (e.g., "./data/tiersum.db" or ":memory:" for in-memory)
    # PostgreSQL: "postgres://user:password@localhost:5432/dbname?sslmode=disable"
    dsn: ./data/tiersum.db
    
    # PostgreSQL specific settings (ignored for SQLite)
    max_connections: 20
    min_connections: 5

  # Local cache settings
  cache:
    # Default TTL for cached summaries
    ttl: 1h
    # Max cache size (number of items)
    max_size: 10000

# Quota configuration for hot/cold document processing
quota:
  # Maximum number of hot documents to process per hour
  # Documents exceeding this quota will be processed as cold (no LLM, BM25+vector only)
  per_hour: 100

# Cold document index: chapter split, Bleve BM25 + HNSW, cold text embeddings (see internal/storage/coldindex).
cold_index:
  markdown:
    # Estimated max tokens per cold markdown chapter (tree + bottom-up merge); ~chars/4 heuristic
    chapter_max_tokens: 512
    # Sliding-window step between starts (estimated tokens) when a leaf still exceeds chapter_max_tokens; overlap ≈ chapter_max_tokens − this value
    sliding_stride_tokens: 100
  search:
    # Each branch (BM25 / vector) fetches this many candidates before merge; final cut uses request topK.
    branch_recall_multiplier: 2
    branch_recall_floor: 20
    branch_recall_ceiling: 200
  # Text embedding for the cold vector (HNSW) branch:
  #   - "auto" (recommended): MiniLM-L6-v2 when ONNX Runtime is available, else simple hash embedding.
  #   - "simple": hash/n-gram only (no ONNX).
  #   - "minilm": require MiniLM + ONNX (fail startup if unavailable).
  # MiniLM uses on-disk HF ONNX + tokenizer (`make fetch-minilm`) plus ONNX Runtime (`make fetch-onnxruntime` or system install).
  embedding:
    provider: auto
    # Defaults assume `make fetch-onnxruntime host` + `make fetch-minilm` from repo root (paths vs cwd at startup).
    # Default ONNX path is Linux x64 (matches Docker image using this file as config). Local macOS examples:
    #   Apple Silicon → third_party/onnxruntime/darwin_arm64/lib/libonnxruntime.dylib
    #   Intel → third_party/onnxruntime/darwin_amd64/lib/libonnxruntime.dylib
    #   Linux arm64 → third_party/onnxruntime/linux_arm64/lib/libonnxruntime.so
    # Or set ONNXRUNTIME_LIB_PATH / use a system-installed lib instead of these fields.
    onnx_runtime_path: third_party/onnxruntime/linux_amd64/lib/libonnxruntime.so
    minilm_model_path: third_party/minilm/model.onnx
    # Empty → third_party/minilm/tokenizer.json (same directory as minilm_model_path).
    minilm_tokenizer_path: ""

# MCP (Model Context Protocol) configuration
mcp:
  # Enable MCP server
  enabled: true
  # Transport type: sse (Server-Sent Events) or stdio
  transport: sse
  # SSE endpoint path
  path: /mcp/sse
  # Public base URL for MCP clients that require absolute message endpoint URLs (no trailing slash).
  # Example: http://localhost:8080 — leave empty to use relative /mcp/message paths (same-origin).
  base_url: ""
  # Allowed tools (empty = all)
  allowed_tools: []

# Document processing
documents:
  # Supported formats for import
  supported_formats:
    - markdown
    - md

  # Maximum document size (50MB)
  max_size: 50MB

  # Chunking strategy for large documents
  chunking:
    enabled: true
    # Max characters per chunk before splitting
    max_chunk_size: 10000
    # Overlap between chunks (preserve context)
    overlap: 200

  # Hot/cold tiering configuration
  tiering:
    # Threshold for hot document (characters)
    hot_content_threshold: 5000
    # Query count threshold for cold document promotion
    cold_promotion_threshold: 3

# Logging configuration
logging:
  # Level: debug, info, warn, error
  level: info
  # Format: json, console
  format: console
  # Output: stdout, file
  output: stdout
  # Log file path (if output = file)
  file_path: ./logs/tiersum.log
  # Enable caller info
  caller: true

# Security (for production)
security:
  # API key for REST API authentication (optional)
  api_key: ""
  # JWT secret for token-based auth
  jwt_secret: ${JWT_SECRET}
  # Token expiration
  token_expiry: 24h

# Feature flags
features:
  # Reserved for future use: partial re-summarization on document updates (not implemented yet)
  incremental_updates: false
  # Enable automatic document conversion skills
  auto_convert: false
  # Enable web UI (future feature)
  web_ui: false
  # Enable cold document search (BM25 + vector)
  cold_doc_search: true
