# TierSum Configuration Example
# Copy this file to config.yaml and modify as needed

# Server
server:
  port: 8080
  # Bind address: empty or 0.0.0.0 → all interfaces (":port").
  host: ""
  # Reverse-proxy (Nginx) same-host deployment (recommended for public internet):
  #   - Set host: "127.0.0.1" so the Go server only accepts local connections.
  #   - Expose HTTPS on Nginx only; proxy_pass to http://127.0.0.1:8080.
  #   - See auth.browser.cookie_secure_mode and trust_proxy_headers below.
  # Applies to ReadTimeout, WriteTimeout, and IdleTimeout on http.Server (e.g. 60s). Zero = no limit.
  timeout: 0
  # Max JSON/multipart body the Gin engine accepts (e.g. 32MB, 10MB).
  max_body_size: 32MB
  cors:
    enabled: false
    allowed_origins: []

# LLM configuration
llm:
  # Provider: openai, anthropic, local, azure
  provider: openai
  # Strip chain-of-thought / thinking blocks from all provider replies. For OpenAI-compatible
  # DeepSeek, DashScope, and SiliconFlow URLs, also sends chat_template_kwargs.enable_thinking=false.
  disable_think: true

  # OpenAI specific (also works with OpenAI-compatible APIs)
  openai:
    api_key: ${OPENAI_API_KEY}
    base_url: https://api.openai.com/v1
    model: gpt-4o-mini
    # Max tokens for summary generation
    max_tokens: 2000
    temperature: 0.6
    # HTTP request timeout (e.g. 120s). Zero = use context deadline only.
    timeout: 120s

  # OpenAI-compatible providers (use 'openai' provider with custom base_url):
  #
  # DeepSeek:
  #   provider: openai
  #   openai:
  #     api_key: ${DEEPSEEK_API_KEY}
  #     base_url: https://api.deepseek.com/v1
  #     model: deepseek-chat
  #
  # Groq:
  #   provider: openai
  #   openai:
  #     api_key: ${GROQ_API_KEY}
  #     base_url: https://api.groq.com/openai/v1
  #     model: llama-3.1-8b-instant
  #
  # Zhipu AI (GLM):
  #   provider: openai
  #   openai:
  #     api_key: ${ZHIPU_API_KEY}
  #     base_url: https://open.bigmodel.cn/api/paas/v4
  #     model: glm-4-flash
  #
  # Moonshot (Kimi):
  #   provider: openai
  #   openai:
  #     api_key: ${MOONSHOT_API_KEY}
  #     base_url: https://api.moonshot.cn/v1
  #     model: moonshot-v1-8k
  #
  # OpenRouter:
  #   provider: openai
  #   openai:
  #     api_key: ${OPENROUTER_API_KEY}
  #     base_url: https://openrouter.ai/api/v1
  #     model: anthropic/claude-3.5-haiku
  #
  # SiliconFlow:
  #   provider: openai
  #   openai:
  #     api_key: ${SILICONFLOW_API_KEY}
  #     base_url: https://api.siliconflow.cn/v1
  #     model: deepseek-ai/DeepSeek-V2.5
  #
  # Azure OpenAI:
  #   provider: openai
  #   openai:
  #     api_key: ${AZURE_OPENAI_API_KEY}
  #     base_url: https://your-resource.openai.azure.com/openai/deployments/your-deployment
  #     model: gpt-4o-mini  # Deployment name

  # Anthropic specific
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
    base_url: https://api.anthropic.com
    model: claude-3-haiku-20240307
    max_tokens: 2000
    temperature: 0.3
    # HTTP request timeout (e.g. 120s). Zero = use context deadline only.
    timeout: 120s

  # Local/Ollama specific
  local:
    base_url: http://localhost:11434
    model: llama3.2
    timeout: 60s

  # LLM prompt templates (each uses %s placeholders; see default values below).
  # Removing a key causes a startup error so operators know something changed.
  prompts:
    # Prepended to every OpenAI-compatible chat completion as the system message.
    system_message: "You are a concise assistant. Respond briefly and accurately."

    # Hot document analysis: instructions only; title and content are sent as separate messages.
    analyze_document: |
      Analyze the document I will provide and return a JSON response.

      Required JSON structure:
      {
        "summary": "document summary (max 300 chars)",
        "tags": ["tag1", "tag2", ...],
        "chapters": [
          {
            "title": "1. Chapter title",
            "summary": "chapter summary (max 150 chars)",
            "content": "### 1.1 Sub-section\nBody text...\n\n### 1.2 Sub-section\nBody text..."
          }
        ]
      }

      Chapter Organization Rules:
      1. First-level chapters (roughly equivalent to Markdown ## headings) must be at most 12.
      2. Keep the original heading text intact (including any existing numbers or punctuation). Prepend a new unified sequential number. Examples:
         - Original: "Kafka 核心设计原则" -> New: "1. Kafka 核心设计原则"
         - Original: "2. 磁盘文件组织" -> New: "2. 2. 磁盘文件组织"
      3. ONLY first-level chapters have a "summary" field. Sub-sections do NOT have summaries.
      4. Sub-sections (### headings and below) must NOT become separate chapters. Include them inside their parent chapter's "content" field.
      5. Inside "content", keep the original sub-heading text intact and prepend a new hierarchical number. Preserve original Markdown heading markers (###, ####, etc.). Examples:
         - Original: "### 顺序写" -> New: "### 1.1 顺序写"
         - Original: "### 2.1 稀疏索引" -> New: "### 2.3 2.1 稀疏索引"
      6. The "content" field must contain the full rewritten text of the entire first-level chapter, including all its sub-sections with re-numbered headings and their body text.
      7. If the document has no clear structure, create a single chapter: title "1. Overview", summary may be empty, content contains the full text.

      Additional Guidelines:
      - Return ONLY the JSON object, no other text.
      - Do NOT wrap the JSON in markdown code fences.
      - Tags should be relevant keywords (lowercase, no spaces use-hyphens).
      - "summary" may be empty when no short summary is appropriate; otherwise keep it within 150 characters.

    # Answer synthesis: instructions only; references and question are sent as separate messages.
    answer_synthesis: |
      Answer the user's question using ONLY the numbered reference excerpts I will provide. If the excerpts do not contain enough information, say so briefly. Write in the same language as the user's question when possible.

      Output format (required): Your entire reply MUST be valid GitHub-Flavored Markdown suitable for direct rendering. Use headings (##, ###), bullet or numbered lists, **bold**, and `inline code` where it improves clarity; use fenced code blocks only for actual code or verbatim snippets. You may use Markdown tables when comparing items. Do not wrap the whole answer in a single outer code fence. Do not output HTML unless it appears inside a fenced code block as an example.

      CRITICAL: Return ONLY the Markdown text. Do NOT wrap your answer in JSON. Do NOT use a "response" or "answer" field. Do NOT include any metadata or explanatory text outside the Markdown content.

      Citations: when you refer to a reference, include the marker [^N^] where N is the reference index (1-based), e.g. [^1^].

    # Hot progressive filter: instructions only; query and items are sent as separate messages.
    filter_documents: |
      Evaluate the relevance of each document I will provide against the query. Return a JSON array of objects with fields "id" (document ID) and "relevance" (0.0-1.0 score).
      Only include documents with relevance >= 0.5. Sort by relevance descending.
      CRITICAL: Use the exact "ID:" value from each document below. Do NOT use list indices or ordinal numbers as the id.

      Response format (JSON only):
      [
        {"id": "doc_id", "relevance": 0.95},
        ...
      ]

    filter_chapters: |
      Evaluate the relevance of each chapter I will provide against the query. Return a JSON array of objects with fields "id" (the path) and "relevance" (0.0-1.0 score).
      Only include chapters with relevance >= 0.5. Sort by relevance descending.
      CRITICAL: Use the exact "Path:" value from each chapter below. Do NOT use list indices or ordinal numbers as the id.

      Response format (JSON only):
      [
        {"id": "doc_id/chapter_title", "relevance": 0.88},
        ...
      ]

    filter_topics: |
      Select the 1-3 most relevant topics from the list I will provide. These topics narrow the search for relevant documents.
      Return a JSON array of objects with fields "id" (topic ID) and "relevance" (0.0-1.0 score).
      Only include topics with relevance >= 0.5. Sort by relevance descending.
      Select at most 3 topics.

      Response format (JSON only):
      [
        {"id": "topic_id", "relevance": 0.95},
        {"id": "another_topic_id", "relevance": 0.82}
      ]

    filter_tags: |
      Select the most relevant tags from the list I will provide. Return a JSON array of objects with fields "tag" and "relevance" (0.0-1.0 score).
      Only include tags with relevance >= 0.5. Sort by relevance descending.

      Response format (JSON only):
      [
        {"tag": "tag-name", "relevance": 0.95},
        {"tag": "another-tag", "relevance": 0.82}
      ]

# Progressive query (POST /api/v1/query/progressive) — synthesized AI answer only (extra LLM call after retrieval).
# Hot/cold retrieval still uses llm.* above for tag/doc/chapter filters. Smaller values here reduce answer latency.
# OpenTelemetry: HTTP + in-process spans (including progressive-query detail spans when the trace is sampled and query.allow_progressive_debug is true) share one TracerProvider and persist to otel_spans.
# Core APIs (query, topic regroup, hot/cold retrieval) are wrapped; document CRUD, tag/topic lists, quota, monitoring, and /traces are not.
telemetry:
  # When false, no global TracerProvider and no HTTP tracing middleware.
  enabled: false
  # Export spans to the application database (requires migrations / otel_spans table).
  persist_to_db: true
  # Random sampling rate for root HTTP spans (0–1). Child spans follow the parent when sampled.
  sample_ratio: 0.1
  # service.name on exported spans
  service_name: tiersum
  # Query parameter that forces RecordAndSample for that request (truthy: 1, true, yes, on).
  force_sample_query_param: debug_trace
  # Header that forces sampling when set to a truthy value (case-insensitive).
  force_sample_header: X-TierSum-Debug-Trace

query:
  # When false, progressive query does not create extra in-process child spans even if the HTTP trace is sampled. Use in locked-down prod to avoid persisting prompts in traces.
  allow_progressive_debug: true
  # Max completion tokens for the answer (unset: min(llm.*.max_tokens, 900)). Set higher for longer answers.
  progressive_answer_max_tokens: 0
  # How many top references (by relevance) to include in the answer prompt (unset: 12, max 30).
  progressive_answer_max_references: 0
  # Max bytes per reference excerpt in that prompt (unset: 3500, max 6000).
  progressive_answer_excerpt_max_bytes: 0

# Summarization configuration (character caps in prompts).
summarization:
  document_summary_max: 500
  chapter_summary_max: 300
  # Max characters embedded per document/chapter in FilterDocuments / FilterChapters prompts.
  paragraph_summary_max: 300

# Storage configuration
storage:
  # In-process repo cache (document rows, etc.).
  cache:
    ttl: 10m
    max_size: 0
  database:
    # Database driver: sqlite3 (default) or postgres
    driver: sqlite3
    
    # Database connection string:
    # SQLite: file path (e.g., "./data/tiersum.db" or ":memory:" for in-memory)
    # PostgreSQL: "postgres://user:password@localhost:5432/dbname?sslmode=disable"
    dsn: ./data/tiersum.db
    
    # PostgreSQL specific settings (ignored for SQLite)
    max_connections: 20
    min_connections: 5

# Cold document index: chapter split, Bleve BM25 + HNSW, cold text embeddings (see internal/storage/coldindex).
cold_index:
  markdown:
    # Estimated max tokens per cold markdown chapter (tree + bottom-up merge); ~chars/4 heuristic
    chapter_max_tokens: 512
    # Sliding-window step between starts (estimated tokens) when a leaf still exceeds chapter_max_tokens; overlap ≈ chapter_max_tokens − this value
    sliding_stride_tokens: 100
  search:
    # Each branch (BM25 / vector) fetches this many candidates before merge; final cut uses request topK.
    branch_recall_multiplier: 2
    branch_recall_floor: 20
    branch_recall_ceiling: 200
  # Text embedding for the cold vector (HNSW) branch:
  #   - "auto" (recommended): MiniLM-L6-v2 when ONNX Runtime is available, else simple hash embedding.
  #   - "simple": hash/n-gram only (no ONNX).
  #   - "minilm": require MiniLM + ONNX (fail startup if unavailable).
  # MiniLM uses on-disk HF ONNX + tokenizer (`make fetch-minilm`) plus ONNX Runtime (`make fetch-onnxruntime` or system install).
  embedding:
    provider: auto
    # Defaults assume `make fetch-onnxruntime host` + `make fetch-minilm` from repo root (paths vs cwd at startup).
    # Default ONNX path is Linux x64 (matches Docker image using this file as config). Local macOS examples:
    #   Apple Silicon → third_party/onnxruntime/darwin_arm64/lib/libonnxruntime.dylib
    #   Intel → third_party/onnxruntime/darwin_amd64/lib/libonnxruntime.dylib
    #   Linux arm64 → third_party/onnxruntime/linux_arm64/lib/libonnxruntime.so
    # Or set ONNXRUNTIME_LIB_PATH / use a system-installed lib instead of these fields.
    onnx_runtime_path: third_party/onnxruntime/linux_amd64/lib/libonnxruntime.so
    minilm_model_path: third_party/minilm/model.onnx
    # Empty → third_party/minilm/tokenizer.json (same directory as minilm_model_path).
    minilm_tokenizer_path: ""

# MCP — routes are fixed at /mcp/sse and /mcp/message.
# MCP clients must provide a valid database API key via X-API-Key or Authorization: Bearer header.
mcp:
  enabled: true
  # Public base URL for MCP clients that require absolute message endpoint URLs (no trailing slash).
  base_url: ""

documents:
  # Max ingest body (UTF-8 byte length of content).
  max_size: 50MB
  # Allowed format values (lowercase). Empty = any non-empty format string.
  supported_formats: []
  chunking:
    # When true, reject ingest if content exceeds max_chunk_size (Unicode code points).
    enabled: false
    max_chunk_size: 10000
  tiering:
    # Threshold for hot document (characters)
    hot_content_threshold: 5000
    # Query count threshold for cold document promotion
    cold_promotion_threshold: 3

# Logging configuration
logging:
  # Level: debug, info, warn, error
  level: info
  # Format: json, console
  format: console
  # Output: stdout, file
  output: stdout
  # Log file path (if output = file)
  file_path: ./logs/tiersum.log
  # Enable caller info
  caller: true

# Dual-track auth: /api/v1 and MCP use database API keys (Bearer or X-API-Key). /bff/v1 uses browser sessions after bootstrap.
# GET /health and GET /metrics stay public at the server root.
auth:
  bootstrap:
    # When false (default), bootstrap may only be called from loopback/private IPs.
    # Set true only if you intentionally expose bootstrap remotely (e.g. behind a VPN).
    allow_remote: false
  browser:
    session_ttl: 168h # HttpOnly session cookie lifetime (sliding on each request)
    slide_user_token_ttl: 168h # Human access-token sliding window when token_expiry_mode=slide
    default_max_devices: 3
    # Persistent "keep me signed in" device token cookie (`tiersum_device`, plaintext prefix ts_d_*; only a hash is stored server-side).
    device_token_ttl: 720h
    # Cookie Secure attribute mode for tiersum_session:
    #   - auto: Secure when request is TLS, or when trust_proxy_headers=true and X-Forwarded-Proto=https
    #   - always: always set Secure=true
    #   - never: always set Secure=false (not recommended)
    cookie_secure_mode: auto
    # When true, trust reverse-proxy headers (X-Forwarded-Proto / X-Forwarded-Ssl) to decide cookie Secure in auto mode.
    trust_proxy_headers: false
    csrf:
      # Protect /bff/v1 unsafe methods using Origin/Referer same-host checks (recommended).
      enabled: true
      require_origin_or_referer: true
      # Optional extra allowed hostnames for Origin/Referer (rare; keep empty for strict same-origin).
      allowed_origins: []

  passkey:
    # When true, /bff/v1/admin/* requires a recent passkey assertion once the admin has at least one passkey registered.
    admin_required: true
    # WebAuthn RP configuration. For browser UI flows, Origin is taken from the request unless rp_origins is set.
    rp_id: "" # optional override; default derives from Origin host when empty
    rp_display_name: TierSum
    # Comma-separated allowed Web Origins (scheme://host[:port]) for WebAuthn clientDataJSON.origin checks.
    # Example (single-site): "https://tiersum.example.com"
    rp_origins: ""
    # In-process ceremony session TTL for Begin→Finish passkey calls.
    webauthn_session_ttl: 5m
    # How long a successful passkey registration/assertion counts as "recently verified" for admin gating.
    session_verification_ttl: 12h

# Feature flags (only keys read by the server are listed here).
features:
  # Embedded Vue UI at /. When false, / returns 404 JSON; /api/v1, /bff/v1, /health, /metrics, and optional /mcp/* still work.
  web_ui: true
