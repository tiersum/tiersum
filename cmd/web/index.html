<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TierSum - Knowledge Base</title>
    <base href="/ui/" />

    <!-- Vendored ESM (served from this app): works offline and in restricted previews where external CDNs fail. -->
    <script type="importmap">
    {
        "imports": {
            "vue": "/ui/js/vendor/vue.esm-browser.prod.js",
            "@vue/devtools-api": "/ui/js/vendor/vue-devtools-api.esm.js",
            "vue-router": "/ui/js/vendor/vue-router.esm-browser.js"
        }
    }
    </script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />

    <!-- Markdown body (marked HTML): vendored github-markdown-css dark theme (no @tailwindcss/typography). -->
    <link rel="stylesheet" href="/ui/css/github-markdown-dark.min.css" />

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            950: '#020617',
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                            600: '#475569',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* Line clamp utilities */
        .line-clamp-1 {
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .line-clamp-4 {
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .fade-enter-active,
        .fade-leave-active {
            transition: opacity 0.15s ease;
        }
        .fade-enter-from,
        .fade-leave-to {
            opacity: 0;
        }

        /* Markdown body overrides for dark theme */
        .markdown-body {
            background-color: transparent !important;
            color: #cbd5e1 !important;
        }
        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3,
        .markdown-body h4,
        .markdown-body h5,
        .markdown-body h6 {
            color: #f1f5f9 !important;
            border-bottom-color: #334155 !important;
        }
        .markdown-body p {
            color: #cbd5e1 !important;
        }
        .markdown-body blockquote {
            border-left-color: #3b82f6 !important;
            background-color: rgba(59, 130, 246, 0.1) !important;
            color: #93c5fd !important;
        }
        .markdown-body code {
            background-color: rgba(30, 41, 59, 0.8) !important;
            color: #e2e8f0 !important;
        }
        .markdown-body pre {
            background-color: #0f172a !important;
            border: 1px solid #334155 !important;
        }
        .markdown-body table th,
        .markdown-body table td {
            border-color: #334155 !important;
        }
        .markdown-body table tr {
            background-color: transparent !important;
            border-top-color: #334155 !important;
        }
        .markdown-body table tr:nth-child(2n) {
            background-color: rgba(30, 41, 59, 0.5) !important;
        }
        .markdown-body hr {
            background-color: #334155 !important;
        }
        .markdown-body ul li::marker,
        .markdown-body ol li::marker {
            color: #3b82f6 !important;
        }
        .markdown-body a {
            color: #60a5fa !important;
        }
        .markdown-body a:hover {
            color: #93c5fd !important;
        }
        .markdown-body strong {
            color: #f1f5f9 !important;
        }

        /* Citation reference markers */
        .citation-ref {
            display: inline-block;
            vertical-align: super;
            font-size: 0.65em;
            font-weight: 600;
            line-height: 1;
            color: #22d3ee;
            background-color: rgba(34, 211, 238, 0.12);
            border: 1px solid rgba(34, 211, 238, 0.25);
            border-radius: 4px;
            padding: 1px 4px;
            margin: 0 1px;
            cursor: default;
            user-select: none;
        }

        /* Force body background to dark */
        html, body {
            background-color: #020617 !important;
        }
    </style>
</head>
<body class="bg-[#020617] text-slate-100 min-h-screen">
    <div id="app">
        <div id="app-boot" style="padding:2rem;font-family:system-ui,sans-serif;background:#020617;color:#e2e8f0;min-height:100vh;">
            <p style="margin:0 0 0.5rem 0"><strong>TierSum</strong> is loading…</p>
            <p style="margin:0;font-size:0.875rem;opacity:0.85">If this never disappears, open DevTools → Console / Network (check <code>/ui/js/main.js</code> and <code>/ui/js/vendor/*.js</code> return 200).</p>
        </div>
    </div>

    <script type="module" src="/ui/js/main.js"></script>
</body>
</html>
