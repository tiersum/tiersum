<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TierSum - Knowledge Base</title>
    <base href="/" />

    <!-- Vendored ESM (served from this app): works offline and in restricted previews where external CDNs fail. -->
    <script type="importmap">
    {
        "imports": {
            "vue": "/js/vendor/vue.esm-browser.prod.js",
            "@vue/devtools-api": "/js/vendor/vue-devtools-api.esm.js",
            "vue-router": "/js/vendor/vue-router.esm-browser.js"
        }
    }
    </script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />

    <!-- Markdown body (marked HTML): vendored github-markdown-css dark theme (no @tailwindcss/typography). -->
    <link rel="stylesheet" href="/css/github-markdown-dark.min.css" />

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            950: '#020617',
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                            600: '#475569',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* Line clamp utilities */
        .line-clamp-1 {
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .line-clamp-4 {
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .fade-enter-active,
        .fade-leave-active {
            transition: opacity 0.15s ease;
        }
        .fade-enter-from,
        .fade-leave-to {
            opacity: 0;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="app">
        <div id="app-boot" style="padding:2rem;font-family:system-ui,sans-serif;background:#020617;color:#e2e8f0;min-height:100vh;">
            <p style="margin:0 0 0.5rem 0"><strong>TierSum</strong> is loading…</p>
            <p style="margin:0;font-size:0.875rem;opacity:0.85">If this never disappears, open DevTools → Console / Network (check <code>/js/main.js</code> and <code>/js/vendor/*.js</code> return 200).</p>
        </div>
    </div>

    <script type="module" src="/js/main.js"></script>
</body>
</html>
