version: '3.8'

# Default: SQLite (single container, zero external dependencies)
# To use PostgreSQL: uncomment the postgres service and update configs/config.yaml

services:
  tiersum:
    build:
      context: ../..
      dockerfile: ../../.cursor/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ../../data:/app/data
      - ../../configs/config.yaml:/app/config.yaml:ro
    # Uncomment below when using PostgreSQL
    # depends_on:
    #   - postgres
    networks:
      - tiersum-network

  # Uncomment to use PostgreSQL instead of SQLite
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: tiersum
  #     POSTGRES_PASSWORD: tiersum
  #     POSTGRES_DB: tiersum
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   networks:
  #     - tiersum-network

volumes:
  # postgres_data:

networks:
  tiersum-network:
    driver: bridge
